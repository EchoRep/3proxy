name: Pure Win64 Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile 3proxy
        run: |
          nmake -f Makefile.msvc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-3proxy
          path: src/*.exe
